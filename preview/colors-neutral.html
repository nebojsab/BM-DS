<!DOCTYPE html>
<html><head>
<style>
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-Regular.ttf') format('truetype'); font-weight: 400; font-style: normal; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-Medium.ttf') format('truetype'); font-weight: 500; font-style: normal; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-SemiBold.ttf') format('truetype'); font-weight: 600; font-style: normal; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-Bold.ttf') format('truetype'); font-weight: 700; font-style: normal; }
</style><meta charset="utf-8">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Poppins', sans-serif; background: #fff; padding: 20px; }
  .swatches { display: flex; gap: 6px; }
  .swatch { flex: 1; height: 80px; border-radius: 8px; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px; }
  .swatch span { font-size: 9px; font-weight: 600; display: block; }
  .label { font-size: 11px; font-weight: 600; color: #212623; margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
</style>
</head><body>
<div class="label">Neutrals</div>
<div class="swatches">
  <div class="swatch" style="background:#00001E"><span style="color:#fff">Navy</span><span style="color:#fff">#00001E</span></div>
  <div class="swatch" style="background:#212623"><span style="color:#fff">Dark</span><span style="color:#fff">#212623</span></div>
  <div class="swatch" style="background:#333333"><span style="color:#fff">700</span></div>
  <div class="swatch" style="background:#666666"><span style="color:#fff">500</span></div>
  <div class="swatch" style="background:#999B9A"><span style="color:#fff">400</span><span style="color:#fff">#999B9A</span></div>
  <div class="swatch" style="background:#CACBCA"><span style="color:#fff">300</span></div>
  <div class="swatch" style="background:#E4E5E5"><span style="color:#212623">200</span></div>
  <div class="swatch" style="background:#EEEEEE"><span style="color:#212623">150</span></div>
  <div class="swatch" style="background:#F7F7F7; border:1px solid #E4E5E5"><span style="color:#212623">100</span></div>
  <div class="swatch" style="background:#F9F9F9; border:1px solid #E4E5E5"><span style="color:#212623">50</span></div>
  <div class="swatch" style="background:#FFFFFF; border:1px solid #E4E5E5"><span style="color:#212623">White</span></div>
</div>
</body></html>
