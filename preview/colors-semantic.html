<!DOCTYPE html>
<html><head>
<style>
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-Regular.ttf') format('truetype'); font-weight: 400; font-style: normal; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-Medium.ttf') format('truetype'); font-weight: 500; font-style: normal; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-SemiBold.ttf') format('truetype'); font-weight: 600; font-style: normal; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-Bold.ttf') format('truetype'); font-weight: 700; font-style: normal; }
</style><meta charset="utf-8">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Poppins', sans-serif; background: #fff; padding: 20px; }
  .row { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; }
  .group { display: flex; gap: 4px; flex: 1; }
  .swatch { width: 32px; height: 32px; border-radius: 6px; }
  .main { width: 48px; height: 48px; border-radius: 8px; }
  .name { font-size: 10px; font-weight: 600; color: #212623; width: 64px; }
  .hex { font-size: 9px; color: #666; margin-top: 2px; }
</style>
</head><body>
  <div class="row">
    <div class="name">Success<div class="hex">#3CC752</div></div>
    <div class="main" style="background:#3CC752"></div>
    <div class="group">
      <div class="swatch" style="background:#216D2D"></div>
      <div class="swatch" style="background:#2B8D3A"></div>
      <div class="swatch" style="background:#37B54B"></div>
      <div class="swatch" style="background:#63D275"></div>
      <div class="swatch" style="background:#A5E5AF"></div>
      <div class="swatch" style="background:#ECF9EE; border:1px solid #E4E5E5"></div>
    </div>
  </div>
  <div class="row">
    <div class="name">Danger<div class="hex">#D64949</div></div>
    <div class="main" style="background:#D64949"></div>
    <div class="group">
      <div class="swatch" style="background:#762828"></div>
      <div class="swatch" style="background:#983434"></div>
      <div class="swatch" style="background:#C34242"></div>
      <div class="swatch" style="background:#DE6D6D"></div>
      <div class="swatch" style="background:#ECABAB"></div>
      <div class="swatch" style="background:#FBEDED; border:1px solid #E4E5E5"></div>
    </div>
  </div>
  <div class="row">
    <div class="name">Warning<div class="hex">#EB9A4C</div></div>
    <div class="main" style="background:#EB9A4C"></div>
    <div class="group">
      <div class="swatch" style="background:#81552A"></div>
      <div class="swatch" style="background:#A76D36"></div>
      <div class="swatch" style="background:#D68C45"></div>
      <div class="swatch" style="background:#EFAE70"></div>
      <div class="swatch" style="background:#F6D1AD"></div>
      <div class="swatch" style="background:#FDF5ED; border:1px solid #E4E5E5"></div>
    </div>
  </div>
  <div class="row">
    <div class="name">Info<div class="hex">#47B0D2</div></div>
    <div class="main" style="background:#47B0D2"></div>
    <div class="group">
      <div class="swatch" style="background:#276174"></div>
      <div class="swatch" style="background:#327D95"></div>
      <div class="swatch" style="background:#41A0BF"></div>
      <div class="swatch" style="background:#6CC0DB"></div>
      <div class="swatch" style="background:#AADBEA"></div>
      <div class="swatch" style="background:#EDF7FB; border:1px solid #E4E5E5"></div>
    </div>
  </div>
</body></html>
