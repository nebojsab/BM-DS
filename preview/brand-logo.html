<!DOCTYPE html>
<html><head>
<style>
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-Regular.ttf') format('truetype'); font-weight: 400; font-style: normal; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-Medium.ttf') format('truetype'); font-weight: 500; font-style: normal; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-SemiBold.ttf') format('truetype'); font-weight: 600; font-style: normal; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-Bold.ttf') format('truetype'); font-weight: 700; font-style: normal; }
</style><meta charset="utf-8">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Poppins', sans-serif; background: #F7F7F7; padding: 24px; display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
  .logo-block { background: #fff; border-radius: 12px; padding: 20px 28px; display: flex; align-items: center; justify-content: center; min-width: 220px; }
  .logo-block.dark { background: #212623; }
  .logo-block.mint { background: #56D2BA; }
  img { max-width: 180px; max-height: 40px; object-fit: contain; }
  .mark { max-width: 56px; max-height: 56px; }
</style>
</head><body>
  <div class="logo-block">
    <img src="../assets/logo-full.png" alt="BuyMaterials full logo" />
  </div>
  <div class="logo-block dark">
    <img src="../assets/logo-full.png" alt="BuyMaterials logo dark bg" style="filter: invert(1) brightness(2);" />
  </div>
  <div class="logo-block mint">
    <img src="../assets/logo-full.png" alt="BuyMaterials logo mint bg" style="filter: invert(1) brightness(2);" />
  </div>
  <div class="logo-block">
    <img class="mark" src="../assets/logo-mark.png" alt="BuyMaterials mark" />
  </div>
  <div class="logo-block dark">
    <img class="mark" src="../assets/logo-mark.png" alt="BuyMaterials mark dark" style="filter: invert(1) brightness(2);" />
  </div>
</body></html>
