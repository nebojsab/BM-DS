<!DOCTYPE html>
<html><head>
<style>
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-Regular.ttf') format('truetype'); font-weight: 400; font-style: normal; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-Medium.ttf') format('truetype'); font-weight: 500; font-style: normal; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-SemiBold.ttf') format('truetype'); font-weight: 600; font-style: normal; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-Bold.ttf') format('truetype'); font-weight: 700; font-style: normal; }
</style><meta charset="utf-8">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Poppins', sans-serif; background: #fff; padding: 20px; }
  .swatches { display: flex; gap: 6px; }
  .swatch { flex: 1; height: 80px; border-radius: 8px; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px; }
  .swatch span { font-size: 9px; font-weight: 600; }
  .label { font-size: 11px; font-weight: 600; color: #212623; margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
</style>
</head><body>
<div class="label">Primary — Mint</div>
<div class="swatches">
  <div class="swatch" style="background:#2F7466"><span style="color:#fff">900</span><span style="color:#fff">#2F7466</span></div>
  <div class="swatch" style="background:#3D9584"><span style="color:#fff">800</span></div>
  <div class="swatch" style="background:#4EBFA9"><span style="color:#fff">700</span></div>
  <div class="swatch" style="background:#56D2BA; outline: 2px solid #212623; outline-offset: 2px;"><span style="color:#fff">600 ★</span><span style="color:#fff">#56D2BA</span></div>
  <div class="swatch" style="background:#78DBC8"><span style="color:#fff">500</span></div>
  <div class="swatch" style="background:#8EE1D1"><span style="color:#00001E">400</span></div>
  <div class="swatch" style="background:#B1EADF"><span style="color:#00001E">300</span></div>
  <div class="swatch" style="background:#CBF1EA"><span style="color:#00001E">200</span></div>
  <div class="swatch" style="background:#EEFBF8; border: 1px solid #E4E5E5"><span style="color:#00001E">100</span><span style="color:#00001E">#EEFBF8</span></div>
</div>
</body></html>
